# 开发环境：导入本地敏感配置（见 dev/*.yml.example）
spring:
  config:
    import:
      - optional:classpath:dev/mysql.yml
      - optional:classpath:dev/redis.yml
      - optional:classpath:dev/jwt.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

zeta:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,https://zeta-app.qyabc.cn,http://zeta-app.qyabc.cn

  seed:
    enabled: true

  upload:
    storage-dir: ./data/uploads
    public-path-prefix: /uploads

  datasource:
    business:
      ddl-auto: update
      show-sql: false
    screen:
      ddl-auto: none
      read-only: false
      show-sql: false

  screen-queue:
    enabled: true
    inbound-key: monitor_command_response
    outbound-key: monitor_command_request
    poll-timeout-seconds: 5
    poll-interval-ms: 2000
