server:
  port: 8080

spring:
  application:
    name: ct-training-server

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  redis:
    host: localhost
    port: 6379
    timeout: 3000ms
    # 启用 Redis 时请移除上方 autoconfigure.exclude 并确保 Redis 已启动

zeta:
  auth:
    token-ttl-hours: 24
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
