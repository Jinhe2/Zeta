# 生产环境（单机部署）
# 敏感连接信息放在 /opt/zeta/config/（见 deploy/config/*.example）
server:
  address: 127.0.0.1
  port: 8080

spring:
  config:
    import:
      - optional:file:/opt/zeta/config/mysql.yml
      - optional:file:/opt/zeta/config/redis.yml
      - optional:file:/opt/zeta/config/jwt.yml
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 501MB

logging:
  file:
    name: /opt/zeta/logs/zeta-server.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 14

zeta:
  # 前端直连 API。这里使用 Spring allowedOriginPatterns 语法，避免现场部署时按机器 IP 修改。
  cors:
    allowed-origins: http://*:3000,http://*:3001,http://*:5173,http://localhost:3000,http://localhost:3001,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:5173,https://zeta-app.qyabc.cn,http://zeta-app.qyabc.cn

  upload:
    storage-dir: /opt/zeta/data/uploads
    public-path-prefix: /uploads

  seed:
    enabled: false

  datasource:
    business:
      ddl-auto: none
      show-sql: false
    screen:
      ddl-auto: none
      read-only: true
      show-sql: false

  screen-queue:
    enabled: false
    inbound-key: ct:screen:business:inbound
    outbound-key: ct:business:screen:outbound
    poll-timeout-seconds: 5
    poll-interval-ms: 2000
